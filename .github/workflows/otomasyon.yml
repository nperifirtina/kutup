name: Gunluk Buzul Analizi

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

# İŞTE SİHRİ BURASI YAPIYOR: Sisteme yazma yetkisini zorla veriyoruz
permissions:
  contents: write 

jobs:
  analiz_et_ve_yayinla:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Sunucuya Çek
        uses: actions/checkout@v3

      - name: Python Ortamını Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Gerekli Kütüphaneleri Yükle
        run: pip install -r requirements.txt

      - name: Ajan Kodunu (Yapay Zekayı) Çalıştır
        env:
          COPERNICUS_USER: ${{ secrets.COPERNICUS_USER }}
          COPERNICUS_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}
        run: python ajan_kodu.py

      - name: Sonuçları GitHub'a Kaydet
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff-index --quiet HEAD || git commit -m "Analiz raporu güncellendi"
          git push
