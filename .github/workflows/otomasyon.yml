name: Gunluk Buzul Analizi

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analiz_et_ve_yayinla:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Sunucuya Çek
        uses: actions/checkout@v4

      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Gerekli Kütüphaneleri Yükle
        run: pip install -r requirements.txt

      - name: Ajan Kodunu (Yapay Zekayı) Çalıştır
        env:
          COPERNICUS_USER: ${{ secrets.COPERNICUS_USER }}
          COPERNICUS_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}
        run: python ajan_kodu.py

      - name: Değişiklikleri GitHub'a Kaydet
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "❄️ Günlük Rapor Güncellendi"
